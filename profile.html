<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020208">
  <title>MATH NEXUS — Stats</title>
  <link rel="stylesheet" href="/testgame.github.io/assets/css/main.css">
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="wrap">
    <header class="topbar">
      <a class="topbar-brand" href="/testgame.github.io/hub.html">← Hub</a>
    </header>
    <h1>Player Stats</h1>
    <p class="subtitle">Your progress across all modules</p>

    <div class="grid stat-grid" style="margin-top:28px;">
      <div class="glass card stat-card">
        <div class="stat-label">Level</div>
        <p class="score-big" style="font-size:2.8rem;" id="stat-level">1</p>
      </div>
      <div class="glass card stat-card">
        <div class="stat-label">Total XP</div>
        <p class="score-big" style="font-size:2.8rem;" id="stat-xp">0</p>
      </div>
      <div class="glass card stat-card">
        <div class="stat-label">Games</div>
        <p class="score-big" style="font-size:2.8rem;" id="stat-games">0</p>
      </div>
      <div class="glass card stat-card">
        <div class="stat-label">Best Combo</div>
        <p class="score-big" style="font-size:2.8rem;" id="stat-combo">0</p>
      </div>
      <div class="glass card stat-card">
        <div class="stat-label">Daily Best</div>
        <p class="score-big" style="font-size:2.8rem;" id="stat-daily">0</p>
      </div>
      <div class="glass card stat-card">
        <div class="stat-label">Achievements</div>
        <p id="stat-achievements" class="achievements-line" style="font-size:0.85rem;margin-top:8px;">None yet</p>
      </div>
    </div>

    <p style="text-align:center;margin-top:32px;">
      <button class="btn" type="button" id="btn-reset" style="color:var(--red);border-color:rgba(244,63,94,0.3);">Reset Progress</button>
    </p>
  </div>
  <script src="/testgame.github.io/assets/js/bg.js" defer></script>
  <script src="/testgame.github.io/assets/js/ui.js" defer></script>
  <script>
    const KEY = "math_nexus_v3";
    const p = JSON.parse(localStorage.getItem(KEY) || "{}");
    document.getElementById("stat-level").textContent = p.level || 1;
    document.getElementById("stat-xp").textContent = p.totalXP || 0;
    document.getElementById("stat-games").textContent = p.gamesPlayed || 0;
    document.getElementById("stat-combo").textContent = p.bestCombo || 0;
    document.getElementById("stat-daily").textContent = p.dailyScore || 0;
    const labels = {
      century: "💯 Century Club",
      combo5: "🔥 Combo Master",
      perfect: "⭐ Perfect Score",
      boss_slayer: "👹 Boss Slayer"
    };
    const ach = p.achievements || [];
    document.getElementById("stat-achievements").innerHTML = ach.length
      ? ach.map(a => labels[a] || a).join("<br>")
      : "Play to unlock!";
    document.getElementById("btn-reset").onclick = () => {
      if (confirm("Reset all progress?")) {
        localStorage.removeItem(KEY);
        location.reload();
      }
    };
  </script>
</body>
</html>
